@if (isOpen) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-xs animate-fadeIn">
    <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-xl border border-slate-200 animate-slideUp text-center space-y-4 mx-4">
      
      <div class="mx-auto flex h-14 w-14 items-center justify-center rounded-full shadow-2xs"
           [ngClass]="{
             'bg-red-50 text-red-600 border border-red-200': type === 'DANGER',
             'bg-amber-50 text-amber-600 border border-amber-200': type === 'WARNING',
             'bg-blue-50 text-blue-600 border border-blue-200': type === 'INFO'
           }">

        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
        </svg>
      </div>


      <div class="space-y-1">
        <h3 class="text-lg font-bold text-slate-800 tracking-tight">{{ title }}</h3>
        <p class="text-sm text-slate-500 px-2 leading-relaxed">{{ description }}</p>
      </div>


      <div class="pt-2 flex items-center gap-3">
        <button type="button" (click)="cancelAction()" 
                class="w-full px-4 py-2.5 text-sm font-medium text-slate-600 bg-slate-50 hover:bg-slate-100 rounded-xl border border-slate-200 transition duration-150">
          No, Cancelar
        </button>
        <button type="button" (click)="confirmAction()" 
                [ngClass]="{
                  'bg-red-600 hover:bg-red-700 focus:ring-red-500': type === 'DANGER',
                  'bg-amber-500 hover:bg-amber-600 focus:ring-amber-500': type === 'WARNING',
                  'bg-blue-600 hover:bg-blue-700 focus:ring-blue-500': type === 'INFO'
                }"
                class="w-full px-4 py-2.5 text-sm font-medium text-white rounded-xl shadow-sm transition duration-150 focus:outline-none focus:ring-2 focus:ring-offset-2">
          Sí, Confirmar
        </button>
      </div>

    </div>
  </div>
}
