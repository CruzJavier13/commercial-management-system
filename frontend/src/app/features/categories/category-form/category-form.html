 <form (ngSubmit)="onSubmit()" class="space-y-5 text-left">
    <div class="border-b border-slate-200 pb-4">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Crear Nueva Categoría</h1>
        <p class="text-sm text-slate-500 mt-1">Registra un nuevo sector de agrupación para clasificar los artículos.</p>
    </div>
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1.5">Código Único de Categoría</label>
        <!-- 🛠️ Cableado con ngModel -->
        <input type="text" [(ngModel)]="categoryForm.categoryCode" name="categoryCode" required maxlength="20" class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition font-mono uppercase" placeholder="Ej: ELEC, FARM, BEB">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1.5">Nombre de la Categoría</label>
        <!-- 🛠️ Cableado con ngModel -->
        <input type="text" [(ngModel)]="categoryForm.name" name="name" required maxlength="100" class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition" placeholder="Ej: Electrónica e Informática">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-1.5">Descripción Opcional</label>
        <!-- 🛠️ Cableado con ngModel -->
        <textarea rows="4" [(ngModel)]="categoryForm.description" name="description" maxlength="250" class="w-full px-3 py-2 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition resize-none" placeholder="Detalla qué tipos de productos pertenecerán a este grupo..."></textarea>
      </div>

      <!-- Barra de Botones Inferior -->
      <div class="pt-4 border-t border-slate-200 flex justify-end gap-3">
        <a routerLink="/categories/list" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-xl transition inline-flex items-center">
          Cancelar y Volver
        </a>
        <button type="submit" class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition">
          Guardar Categoría
        </button>
      </div>
</form>
