<div class="min-h-screen flex items-center justify-center bg-slate-900 px-4">
  <div class="max-w-md w-full space-y-8 bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700">
    <div>
      <h2 class="mt-6 text-center text-3xl font-extrabold text-white">
        Sistema Variedades Jennifer - Panel de Administración
      </h2>
      <p class="mt-2 text-center text-sm text-slate-400">
        Ingresa tus credenciales para acceder al panel
      </p>
    </div>
    <form class="mt-8 space-y-6">
      <div class="rounded-md shadow-sm space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Usuario</label>
          <input type="text" required class="appearance-none rounded-lg relative block w-full px-3 py-2.5 border border-slate-600 bg-slate-700 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm" placeholder="ejemplo@comercio.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
          <input type="password" required class="appearance-none rounded-lg relative block w-full px-3 py-2.5 border border-slate-600 bg-slate-700 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm" placeholder="••••••••">
        </div>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-800 focus:ring-blue-500 transition duration-150">
          Iniciar Sesión
        </button>
      </div>
    </form>
  </div>
</div>
