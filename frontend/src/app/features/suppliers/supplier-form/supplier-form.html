<div class="w-full space-y-6 animate-fadeIn text-left">
  
  <div class="border-b border-slate-200 pb-4">
    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Ficha Técnica de Proveedor</h1>
    <p class="text-sm text-slate-500 mt-1">Registra o modifica las casas distribuidoras comerciales.</p>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200 space-y-6">
    <div>
      <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider flex items-center gap-2">
        <span class="text-blue-500">🏢</span> Información de la Entidad Comercial
      </h3>
    </div>

    <form class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Código Único de Proveedor</label>
          <input type="text" [(ngModel)]="supplierForm.supplierCode" name="supplierCode" required maxlength="50" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 font-mono uppercase transition duration-150 placeholder-slate-400" placeholder="Ej: PROV-DIST-01">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Identificación Fiscal (RUC / Cédula)</label>
          <input type="text" [(ngModel)]="supplierForm.taxIdentification" name="taxIdentification" required maxlength="50" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 font-mono uppercase transition duration-150 placeholder-slate-400" placeholder="Ej: J0310000012345">
        </div>

        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Nombre de la Empresa / Razón Social</label>
          <input type="text" [(ngModel)]="supplierForm.companyName" name="companyName" required maxlength="150" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 placeholder-slate-400" placeholder="Ej: Distribuidora Comercial de Nicaragua S.A.">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Correo Electrónico de Contacto</label>
          <input type="email" [(ngModel)]="supplierForm.email" name="email" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 placeholder-slate-400" placeholder="ejemplo@proveedor.com">
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Número de Teléfono</label>
          <input type="tel" [(ngModel)]="supplierForm.phoneNumber" name="phoneNumber" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 placeholder-slate-400" placeholder="Ej: +505 2222-2222">
        </div>

        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Dirección Física o Fiscal Completa</label>
          <textarea rows="3" [(ngModel)]="supplierForm.address" name="address" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 resize-none placeholder-slate-400" placeholder="Detalles de ubicación de las bodegas u oficinas principales..."></textarea>
        </div>
      </div>

      <div class="pt-4 border-t border-slate-200 flex justify-end gap-3">
        <a routerLink="/suppliers/list" class="px-5 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-xl transition duration-150 inline-flex items-center">
          Cancelar y Volver
        </a>
        <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition duration-150">
          Guardar Proveedor
        </button>
      </div>

    </form>
  </div>

</div>
