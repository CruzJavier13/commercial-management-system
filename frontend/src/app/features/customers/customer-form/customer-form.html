<div class="w-full space-y-6 animate-fadeIn text-left">
  
  <div class="border-b border-slate-200 pb-4">
    <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Ficha Técnica de Cliente</h1>
    <p class="text-sm text-slate-500 mt-1">Registra o modifica la información de los compradores y sus credenciales fiscales para los procesos de facturación en caja.</p>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200 space-y-6">
    <div>
      <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider flex items-center gap-2">
        <span class="text-blue-500">👥</span> Información del Comprador
      </h3>
    </div>

    <!-- Rejilla de Inputs Sincronizada con tu Tabla sal.Customers de SQL Server -->
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- Campo 1: Código del Cliente -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Código Único de Cliente</label>
          <input type="text" [(ngModel)]="customerForm.customerCode" name="customerCode" required maxlength="50" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 font-mono uppercase transition duration-150 placeholder-slate-400" placeholder="Ej: CLI-NAT-089">
        </div>

        <!-- Campo 2: Identificación Fiscal (RUC o Cédula Nicaragüense) -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Identificación Fiscal (RUC / Cédula)</label>
          <input type="text" [(ngModel)]="customerForm.identificationNumber" name="identificationNumber" required maxlength="50" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 font-mono uppercase transition duration-150 placeholder-slate-400" placeholder="Ej: 001-120594-1002J o J031000012345">
        </div>

        <!-- Campo 3: Nombre Completo o Razón Social -->
        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Nombre Completo / Razón Social</label>
          <input type="text" [(ngModel)]="customerForm.fullName" name="fullName" required maxlength="150" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 placeholder-slate-400" placeholder="Ej: Juan Carlos Pérez Martínez / Distribuidora S.A.">
        </div>

        <!-- Campo 4: Correo Electrónico -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Correo Electrónico</label>
          <input type="email" [(ngModel)]="customerForm.email" name="email" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 placeholder-slate-400" placeholder="cliente@ejemplo.com">
        </div>

        <!-- Campo 5: Número de Teléfono -->
        <div>
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Número de Teléfono</label>
          <input type="tel" [(ngModel)]="customerForm.phoneNumber" name="phoneNumber" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 placeholder-slate-400" placeholder="Ej: +505 8888-8888">
        </div>

        <!-- Campo 6: Dirección Física Completa -->
        <div class="md:col-span-2">
          <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Dirección de Domicilio o Despacho</label>
          <textarea rows="3" [(ngModel)]="customerForm.address" name="address" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 resize-none placeholder-slate-400" placeholder="Dirección domiciliar exacta del cliente..."></textarea>
        </div>
      </div>

      <div class="pt-4 border-t border-slate-200 flex justify-end gap-3">
        <a routerLink="/customers/list" class="px-5 py-2.5 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-xl transition duration-150 inline-flex items-center">
          Cancelar y Volver
        </a>
        <button type="submit" class="px-6 py-2.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition duration-150">
          Guardar Cliente
        </button>
      </div>

    </form>
  </div>

</div>
