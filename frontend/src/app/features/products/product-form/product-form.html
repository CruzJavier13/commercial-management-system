<div class="w-full space-y-6 animate-fadeIn text-left">

    <!-- Encabezado Fijo -->
    <div class="border-b border-slate-200 pb-4">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Crear Nuevo Producto</h1>
        <p class="text-sm text-slate-500 mt-1">Ingresa las propiedades base del catálogo.</p>
    </div>

    <!-- Formulario Único Central -->
    <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-200">
        <form (ngSubmit)="onSubmit()" class="space-y-6">

            <div>
                <h3 class="text-sm font-bold text-slate-700 uppercase tracking-wider mb-4 flex items-center gap-2">
                    <span>📦</span> Datos Base del Artículo
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      
      <!-- Fila 1: Código y Nombre expandidos al 50% cada uno -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Código de Barra / SKU</label>
        <input type="text" [(ngModel)]="productForm.productCode" name="productCode" required maxlength="50" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 font-mono uppercase transition duration-150" placeholder="Ej: SKU-9082">
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Nombre o Razón Comercial</label>
        <input type="text" [(ngModel)]="productForm.name" name="name" required maxlength="150" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150" placeholder="Ingresa el nombre completo del producto o servicio">
      </div>
      
      <!-- Fila 2: Proveedor Autorizado y Precio Base ocupando 50% cada uno -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Proveedor Autorizado</label>
        <div class="relative">
          <select [(ngModel)]="productForm.supplierId" name="supplierId" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 appearance-none cursor-pointer pr-10">
            <option value="0" disabled>-- Asigna un Distribuidor --</option>
            @for (sup of suppliers; track sup.id) {
                <option [value]="sup.id">🏢 {{ sup.companyName }}</option>
            }
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">▼</div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Precio Base de Venta ($)</label>
        <input type="number" [(ngModel)]="productForm.basePrice" name="basePrice" required step="0.01" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 font-semibold transition duration-150" placeholder="0.00">
      </div>

      <!-- Fila 3: El Cambio Maestro — Categoría e Input largo frente a frente al 50% -->
      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Categoría Comercial (Muta la vista)</label>
        <div class="relative">
          <select [(ngModel)]="productForm.categoryId" name="categoryId" (change)="onCategoryChange($event)" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 appearance-none cursor-pointer pr-10">
            <option value="0" disabled>-- Selecciona el Sector --</option>
            @for (cat of categories; track cat.id) {
                <option [value]="cat.id">📁 {{ cat.name }} ({{ cat.categoryCode }})</option>
            }
          </select>
          <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">▼</div>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold text-slate-600 uppercase mb-2 tracking-wide">Descripción Detallada del Artículo (Opcional)</label>
        <textarea rows="1" [(ngModel)]="productForm.description" name="description" maxlength="500" class="w-full px-3 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white text-slate-800 transition duration-150 resize-none placeholder-slate-400" placeholder="Especificaciones, características o notas de inventario..."></textarea>
      </div>

      <!-- Fila 4: Checkbox ocupando las 2 columnas en el fondo de la tarjeta -->
      <div class="md:col-span-2 flex items-center gap-3 p-4 bg-slate-50 border border-slate-200 rounded-xl">
        <input type="checkbox" [(ngModel)]="productForm.isVirtualService" name="isVirtualService" id="isVirtual" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
        <label for="isVirtual" class="text-xs font-bold text-slate-700 uppercase cursor-pointer select-none">¿Este registro corresponde a un servicio virtual o producto intangible? (Exime control físico de stock)</label>
      </div>

    </div>
            </div>
            <div *ngIf="formType === 'MEDICINA'"
                class="p-5 bg-emerald-50/60 rounded-2xl border border-emerald-200 space-y-4 animate-fadeIn">
                <h4 class="text-xs font-bold uppercase tracking-wider text-emerald-700 flex items-center gap-1.5">
                    <span>🩺</span> Extensiones de Atributos Médicos (Farmacia)
                </h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-emerald-800 mb-1.5">Número de Registro
                            Sanitario</label>
                        <input type="text" [(ngModel)]="productForm.healthRegisterNumber" name="healthRegisterNumber"
                            class="w-full px-3 py-2 text-sm bg-white border border-emerald-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800 uppercase font-mono"
                            placeholder="Ej: MINSA-RNS-2026">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-emerald-800 mb-1.5">Principio Activo</label>
                        <input type="text" [(ngModel)]="productForm.activeIngredient" name="activeIngredient"
                            class="w-full px-3 py-2 text-sm bg-white border border-emerald-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-800"
                            placeholder="Ej: Ibuprofeno, Amoxicilina">
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" [(ngModel)]="productForm.expirationDateRequired"
                            name="expirationDateRequired" id="expDate"
                            class="w-4 h-4 text-emerald-600 border-emerald-300 rounded focus:ring-emerald-500">
                        <label for="expDate" class="text-xs font-medium text-emerald-900 cursor-pointer">Exigir lote
                            y fecha de vencimiento obligatoria</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" [(ngModel)]="productForm.requiresPrescription"
                            name="requiresPrescription" id="reqPres"
                            class="w-4 h-4 text-emerald-600 border-emerald-300 rounded focus:ring-emerald-500">
                        <label for="reqPres" class="text-xs font-medium text-emerald-900 cursor-pointer">Bloquear
                            venta sin receta médica retenida</label>
                    </div>
                </div>
            </div>

            <div *ngIf="formType === 'ELECTRONICA'"
                class="p-5 bg-blue-50/60 rounded-2xl border border-blue-200 space-y-4 animate-fadeIn">
                <h4 class="text-xs font-bold uppercase tracking-wider text-blue-700 flex items-center gap-1.5">
                    <span>📱</span> Extensiones de Atributos de Dispositivos (Tecnología)
                </h4>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 mb-1.5">Marca Fabricante</label>
                        <input type="text" [(ngModel)]="productForm.brand" name="brand"
                            class="w-full px-3 py-2 text-sm bg-white border border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800"
                            placeholder="Ej: Samsung, Apple, Xiaomi">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 mb-1.5">Modelo Comercial</label>
                        <input type="text" [(ngModel)]="productForm.model" name="model"
                            class="w-full px-3 py-2 text-sm bg-white border border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800"
                            placeholder="Ej: Galaxy S24 Ultra">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 mb-1.5">Número de Serie único o
                            IMEI</label>
                        <input type="text" [(ngModel)]="productForm.serialNumberOrIMEI" name="serialNumberOrIMEI"
                            class="w-full px-3 py-2 text-sm bg-white border border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800 font-mono uppercase"
                            placeholder="Código identificador físico de fábrica">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-blue-800 mb-1.5">Periodo de Garantía (Meses
                            vigentes)</label>
                        <input type="number" [(ngModel)]="productForm.warrantyPeriodMonths" name="warrantyPeriodMonths"
                            class="w-full px-3 py-2 text-sm bg-white border border-blue-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-800"
                            placeholder="12">
                    </div>
                </div>
            </div>

            <!-- Barra de Acciones del Formulario de Pantalla Completa -->
            <div class="pt-4 border-t border-slate-200 flex justify-end gap-3">
                <a routerLink="/products/list"
                    class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-xl transition inline-flex items-center">
                    Cancelar y Volver
                </a>
                <button type="submit"
                    class="px-5 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-sm transition">
                    Guardar Ficha Técnica
                </button>
            </div>

        </form>
    </div>
</div>
